name: Sync Shared Workflows

on:
  # Run when workflow files or git scripts change on main
  push:
    branches: [ "main", "master" ]
    paths:
      - '.github/workflows/sync-templates.yml'
      - '.github/workflows/sync-workflows.yml'
      - 'scripts/**'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      direction:
        description: 'Sync direction'
        required: true
        default: 'push'
        type: choice
        options:
          - push
          - pull
  # Scheduled sync weekly
  schedule:
    - cron: '0 4 * * 1'   # Every Monday at 04:00 UTC

jobs:
  sync-workflows:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout freepbx-quickprovisioner
        uses: actions/checkout@v4
        with:
          path: freepbx-quickprovisioner

      - name: Checkout Pocket-Provisioner
        uses: actions/checkout@v4
        with:
          repository: Ezra90/Pocket-Provisioner
          path: pocket-provisioner
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}

      - name: Determine sync direction
        id: direction
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dir=${{ github.event.inputs.direction }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "dir=pull" >> "$GITHUB_OUTPUT"
          else
            echo "dir=push" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync shared workflow files
        run: |
          DIRECTION="${{ steps.direction.outputs.dir }}"

          # Only sync the template-sync workflow (shared between repos)
          # Each repo keeps its own build/release workflows
          SHARED_WORKFLOWS="sync-templates.yml"

          if [ "$DIRECTION" = "push" ]; then
            echo "Pushing shared workflows from freepbx-quickprovisioner → Pocket-Provisioner"
            for wf in $SHARED_WORKFLOWS; do
              SRC="freepbx-quickprovisioner/.github/workflows/$wf"
              DST="pocket-provisioner/.github/workflows/$wf"
              if [ -f "$SRC" ]; then
                mkdir -p "$(dirname "$DST")"
                cp "$SRC" "$DST"
                echo "  Synced: $wf"
              fi
            done
          else
            echo "Pulling shared workflows from Pocket-Provisioner → freepbx-quickprovisioner"
            for wf in $SHARED_WORKFLOWS; do
              SRC="pocket-provisioner/.github/workflows/$wf"
              DST="freepbx-quickprovisioner/.github/workflows/$wf"
              if [ -f "$SRC" ]; then
                mkdir -p "$(dirname "$DST")"
                cp "$SRC" "$DST"
                echo "  Synced: $wf"
              fi
            done
          fi

      - name: Push to Pocket-Provisioner
        if: ${{ steps.direction.outputs.dir != 'pull' }}
        working-directory: pocket-provisioner
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          if git diff --cached --quiet; then
            echo "No workflow changes to sync"
          else
            git commit -m "sync: update shared workflows from freepbx-quickprovisioner"
            git push
          fi

      - name: Push to freepbx-quickprovisioner
        if: ${{ steps.direction.outputs.dir == 'pull' }}
        working-directory: freepbx-quickprovisioner
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          if git diff --cached --quiet; then
            echo "No workflow changes to sync"
          else
            git commit -m "sync: update shared workflows from Pocket-Provisioner"
            git push
          fi
